server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: h5-ordering-system

  # 数据库初始化配置
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      continue-on-error: false
      encoding: UTF-8

  # MySQL 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 连接 h5_ordering 数据库
    url: jdbc:mysql://localhost:3306/h5_ordering?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}

    # Druid 连接池配置
    druid:
      # 初始连接数
      initial-size: 5
      # 最小空闲连接数
      min-idle: 5
      # 最大活跃连接数
      max-active: 20
      # 获取连接等待超时时间 (毫秒)
      max-wait: 60000
      # 连接空闲检测时间 (毫秒)
      time-between-eviction-runs-millis: 60000
      # 连接最小空闲时间 (毫秒)
      min-evictable-idle-time-millis: 300000
      # 连接最大空闲时间 (毫秒)
      max-evictable-idle-time-millis: 900000
      # 测试连接有效性的 SQL
      validation-query: SELECT 1
      # 申请连接时检测空闲时间
      test-while-idle: true
      # 申请连接时执行验证 SQL
      test-on-borrow: false
      # 归还连接时执行验证 SQL
      test-on-return: false
      # 是否缓存 PreparedStatement
      pool-prepared-statements: true
      # 最大缓存 PreparedStatement 数量
      max-pool-prepared-statement-per-connection-size: 20

      # StatViewServlet 配置 (SQL 监控)
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin123
        reset-enable: false
        allow: 127.0.0.1

      # WebStatFilter 配置
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# MyBatis-Plus 配置
mybatis-plus:
  #  Mapper XML 文件路径
  mapper-locations: classpath*:/mapper/**/*.xml
  # 实体类包路径
  type-aliases-package: com.ordering.entity
  configuration:
    # 驼峰命名转换
    map-underscore-to-camel-case: true
    # 缓存配置
    cache-enabled: true
    # 懒加载配置
    lazy-loading-enabled: false
    # 日志配置
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      # 主键策略 (雪花算法)
      id-type: assign_id
      # 逻辑删除字段
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  # 密钥
  secret: ${JWT_SECRET:h5-ordering-system-secret-key-2026}
  # Token 有效期 (7 天，单位：毫秒)
  expiration: 604800000
  # Token 前缀
  header: Authorization
  prefix: "Bearer "

# 日志配置
logging:
  level:
    root: INFO
    com.ordering: DEBUG
    com.ordering.mapper: DEBUG
