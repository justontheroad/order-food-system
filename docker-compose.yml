version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: h5-ordering-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: h5_ordering
      MYSQL_USER: ordering
      MYSQL_PASSWORD: ordering123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/src/main/resources/db/migration/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    networks:
      - h5-ordering-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: h5-ordering-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - h5-ordering-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端 SpringBoot 应用
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: h5-ordering-backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: h5_ordering
      MYSQL_USERNAME: ordering
      MYSQL_PASSWORD: ordering123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JAVA_OPTS: -Xmx512m -Xms256m
    ports:
      - "8080:8080"
    networks:
      - h5-ordering-network
    volumes:
      - ./backend/logs:/app/logs

  # 前端 Nginx 服务
  frontend:
    image: nginx:alpine
    container_name: h5-ordering-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - h5-ordering-network

networks:
  h5-ordering-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
